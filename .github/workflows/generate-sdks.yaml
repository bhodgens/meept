name: Generate OpenAPI SDKs

# Run on API spec changes or manual trigger
on:
  push:
    paths:
      - 'docs/reference/http-api/openapi.yaml'
  workflow_dispatch:

jobs:
  generate-sdks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Generate Go SDK
        run: |
          openapi-generator-cli generate \
            -i docs/reference/http-api/openapi.yaml \
            -g go \
            -o sdk/go \
            --skip-validate-spec \
            --additional-properties=packageName=meeptclient,packageVersion=0.2.0,generateInterfaces=true,interfaceMode=deferentially

      - name: Generate Dart SDK
        run: |
          openapi-generator-cli generate \
            -i docs/reference/http-api/openapi.yaml \
            -g dart \
            -o sdk/dart \
            --skip-validate-spec \
            --additional-properties=packageName=meept_client,packageVersion=0.2.0,pubName=meept_client,useNullSafety=true

      - name: Clean up generated docs/tests (reduce PR size)
        run: |
          rm -rf sdk/go/docs sdk/go/test sdk/go/.openapi-generator
          rm -rf sdk/dart/doc sdk/dart/test sdk/dart/.openapi-generator

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: regenerate OpenAPI SDKs'
          title: 'chore: regenerate OpenAPI SDKs'
          body: |
            Auto-generated SDK updates from openapi-generator.
            
            Generated by: ${{ github.event.workflow_run.head_sha || github.sha }}
          branch: auto/update-openapi-sdks
          base: main
          labels: automated-pr, sdk

      - name: Verify Go SDK compiles
        run: cd sdk/go && go build ./...

      - name: Verify Dart SDK compiles
        run: cd sdk/dart && dart pub get && dart analyze
