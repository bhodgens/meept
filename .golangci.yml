# golangci-lint configuration for meept
# https://golangci-lint.run/usage/configuration/
#
# Curated 2026-06-19 after a full audit (see docs/20260618-checkreview.md).
# The goal: enable linters that catch real bugs at acceptable noise; disable
# linters whose findings were overwhelmingly stylistic/cosmetic or have
# near-100% false-positive rates on this codebase. Run `make lint` to execute.

version: "2"

linters:
  enable:
    # Bugs & correctness
    - bodyclose          # HTTP response body closed
    # contextcheck disabled: near-100% false-positive rate for this codebase.
    # Daemon shutdown paths, bus handler goroutines, RPC cache/stats operations,
    # and scheduler operations all legitimately use context.Background().
    - copyloopvar        # Loop variable copies (Go 1.22+)
    - durationcheck      # Duration multiplication
    - errcheck           # Unchecked errors
    - errname            # Sentinel error naming (Err/FooError)
    - errorlint          # Error wrapping best practices
    - govet              # go vet passes
    - ineffassign        # Unused assignments
    - nilerr             # Returns nil despite checking err != nil
    - nilnesserr         # Returns wrong nil after err check
    - nilnil             # Returns nil error + nil value
    - rowserrcheck       # sql.Rows.Err checked
    - sqlclosecheck      # sql.Rows/Stmt closed
    - staticcheck        # Staticcheck rules (includes SA4023)
    - unused             # Unused code
    - wastedassign       # Wasted assignments

    # Security
    - gosec              # Security issues

    # Performance
    - unconvert          # Unnecessary type conversions

    # Style & readability (curated subset — disabled the noisy ones)
    - misspell           # Typos
    - sloglint           # Consistent slog usage

    # Modernization (kept enabled as a gate after the 2026-06-19 bulk cleanup)
    - intrange           # Use integer range in for loops
    - modernize          # Modern Go idioms

    # DISABLED 2026-06-19 (see docs/20260618-checkreview.md for rationale):
    # - goconst     (712 findings, cosmetic; would force extracting every repeated string)
    # - gocritic    (307 findings, mostly stylistic; subset curated into other linters)
    # - prealloc    (15 findings, premature optimization; no measurable benefit)
    # - revive      (46 findings, opinionated; overlaps with staticcheck + govet)
    # - tagalign    (234 findings, pure formatting; not a real bug class)
    # - unparam     (74 findings, often false-positive on interface implementations)
    # - usestdlibvars (15 findings, cosmetic; replace with ad-hoc review)

  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    paths:
      - "archive/.*"
      - "third_party/.*"
      - "testdata/.*"
      - "vendor/.*"
      - ".worktrees/.*"  # git worktrees hold parallel feature branches; never lint

  settings:
    staticcheck:
      checks:
        - "all"
        - "SA4023"  # Impossible comparison: interface cannot be concrete type

    gosec:
      excludes:
        # G104 (errors unhandled) — overlaps with errcheck, and most findings
        # are intentional deferred-Close / HTTP-writer patterns. See
        # docs/20260618-checkreview.md for the policy rationale.
        - G104
        # G204 (subprocess launched with variable) — this is the project's
        # core feature (agent executes shell commands). Real control is the
        # Tirith pre-execution scanner + risk classifier + audit log.
        - G204
        # G304 (file path provided as taint input) — every config/skill/tool
        # loader triggers this. Real control is the project worktree fence
        # (pkg/security/permissions.go) and the security engine audit log.
        - G304
        # G301/G302/G306 (permission bits) — noisy; will be addressed in a
        # separate focused pass.
        - G301
        - G302
        - G306

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    sloglint:
      key-naming-case: snake
      args-on-sep-lines: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  fix: false

formatters:
  exclusions:
    paths:
      - "archive/.*"
      - "third_party/.*"
      - "testdata/.*"
      - "vendor/.*"
      - ".worktrees/.*"
