# Specialist agents
# These agents handle specific types of tasks delegated by the dispatcher.

[[agent]]
id = "coder"
name = "Code Specialist"
role = "executor"
description = "Writes, modifies, and explains code"
model = ""
enabled = true

additional_tools = ["file_read", "file_write", "file_delete", "list_directory", "shell_execute"]
capabilities = ["code", "reasoning"]

prompt_components = [
    "base.constitution",
    "base.restrictions",
    "base.task_principles",
    "specialist.coder",
    "conditional.code_style",
    "capabilities.memory",
    "capabilities.tasks",
]

[agent.constraints]
max_iterations = 15
timeout_seconds = 600
max_tokens_per_turn = 4096
max_memory_refs = 20

