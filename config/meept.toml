# Meept Configuration
# Copy to ~/.meept/meept.toml and customize

[daemon]
socket_path = "~/.meept/meept.sock"
pid_file = "~/.meept/meept.pid"
log_level = "INFO"
data_dir = "~/.meept"

# LLM model configuration has moved to config/models.json5
# (JSON5 format with provider/model-id references and capability tags)

[llm.budget]
hourly_token_limit = 100000
daily_token_limit = 1000000
rate_limit_rpm = 30
aggressiveness = 0.5  # 0.0 = very conservative, 1.0 = use full budget

[llm.context_firewall]
enabled = true
# Proactive context compression (multi-stage: warning at 50%, summarize at 60%,
# aggressive at 70%, hard limit at 80%). When enabled, the compressor runs before
# the legacy chunk/summarize/drop pipeline.
proactive_compression = false
# model_context_limit = 0   # Override model context limit for compression (0 = use model's limit)
# hierarchical_summarization = false  # enable recursive re-summarization
# max_summary_level = 3               # max recursion depth
# summary_level_threshold = 500       # token threshold to trigger re-summarization

[memory]
data_dir = "~/.meept/memory"
consolidation_interval_hours = 6

[memory.episodic]
enabled = true
max_context_items = 20

[memory.task]
enabled = true
# Separate .mv2 files per domain
domains = ["general", "code", "commands"]

[memory.personality]
enabled = true
update_interval_conversations = 10

[memory.security]
enabled = true       # Enable security scanning on memory writes
fail_closed = true   # Block memory operations when sanitizer unavailable
log_blocked = true   # Log blocked attempts for audit

[memory.caching]
enabled = true                # Enable frozen snapshots for API prefix caching (Hermes pattern)
refresh_on_session_end = true # Refresh snapshot at session end

[memory.limits.episodic]
enabled = true
character_limit = 2200

[memory.limits.task_code]
enabled = true
character_limit = 3000

[memory.limits.task_general]
enabled = true
character_limit = 2200

[memory.limits.task_commands]
enabled = true
character_limit = 1500

[memory.limits.personality]
enabled = true
character_limit = 1375

[memory.expiration]
enabled = true
access_expiration_days = 90       # Expire memories unused for 90 days
summarize_before_delete = true    # Create summary before deleting expired memories
summary_category = "archived"     # Category for summary memories

[memory.versioning]
enabled = true
max_versions = 10  # Keep last 10 versions per memory

# Multi-agent system with TOML-based agent definitions
# and recombinant prompt components
[agents]
enabled = false
config_dirs = ["~/.meept/agents", "config/agents"]  # Agent definition search paths
prompts_dir = "config/prompts"                       # Base directory for prompt components
default_model = ""                                   # Empty = use llm.default_model
dispatcher_id = "dispatcher"                         # Agent that handles intake/routing
# Agent definitions are in config/agents/*.toml
# Prompt components are in config/prompts/{base,dispatcher,specialist,conditional,chat,capabilities}/*.md

[security]
# Input sanitization
sanitize_inputs = true
sanitize_strictness = "standard"  # "permissive", "standard", "strict"
llm_filter_external = false       # Enable LLM-based filtering for untrusted sources

# Output monitoring
monitor_output = true             # Enable credential detection in LLM output
redact_output = true              # Automatically redact detected credentials

# Shell command security
scan_shell_commands = true        # Enable Tirith command scanning before execution
tirith_binary = "tirith"          # Path to tirith binary (must be on PATH)

# Action permissions
require_confirmation_high = true
require_confirmation_critical = true
block_financial = true

# Allowed paths for file operations (glob patterns)
allowed_paths = ["~/*"]
blocked_paths = ["~/.ssh/*", "~/.gnupg/*", "~/.meept/meept.toml"]

# Audit logging
enable_audit_log = false          # Enable security audit logging
audit_db_path = "~/.meept/audit.db"

[scheduler]
enabled = true
timezone = "UTC"

[telegram]
enabled = false
token = ""  # Bot API token (or use env var ${TELEGRAM_BOT_TOKEN})
creator_id = 0  # Telegram user ID of the creator
allowed_users = []  # Empty = allow all users
allowed_chats = []  # Empty = allow all chats
poll_timeout = 30   # Long polling timeout in seconds

[web]
enabled = false
host = "127.0.0.1"
port = 8420
secret_key = ""  # Required for JWT

[mcp]
enabled = false
config_file = "~/.meept/mcp_servers.json"
# MCP servers are configured in a separate JSON file.
# Example mcp_servers.json:
# {
#   "servers": [
#     {
#       "name": "filesystem",
#       "type": "stdio",
#       "command": ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/home/user"]
#     },
#     {
#       "name": "remote-api",
#       "type": "http",
#       "url": "https://mcp.example.com/api",
#       "headers": {"Authorization": "Bearer ${MCP_API_KEY}"}
#     }
#   ]
# }

[plugins]
enabled = true
directory = "~/.meept/plugins"

[workspace]
enabled = true
base_dir = "~/.meept/workspaces"
auto_commit = true
commit_on_plan = true
commit_on_step = true
cleanup_completed = false

[skills]
enabled = false
search_paths = []     # Additional skill directories beyond defaults
auto_reload = false   # Watch for skill file changes (not yet implemented)
# Skills are discovered via 3-tier SKILL.md scanning:
#   1. .meept/skills/           (project-local, highest priority)
#   2. ~/.meept/skills/         (user-global)
#   3. ~/.config/meept/skills/  (system-wide, lowest priority)
# Model selection uses capability matching from config/models.json5
#
# Invoke skills with: /skill-name <input>
# List skills with: meept skills list
# Show skill details: meept skills show <name>
# Run a skill: meept skills run <name> <input>

[clawskills]
enabled = false
registry_url = "https://clawhub.ai"
install_dir = "~/.meept/clawskills"
auto_update = false                # Automatically update skills on daemon start
max_installed = 50                 # Maximum number of installed clawskills
default_risk_level = "high"        # All clawskills are treated as HIGH risk (cannot go lower)
max_iterations = 10                # Cap agent-loop iterations for clawskills
blocked_slugs = []                 # Slugs that will never be loaded by the daemon

[selfimprove]
enabled = false
data_dir = "~/.meept/selfimprove"
max_iterations_per_cycle = 5       # Max improvement iterations per run
max_fixes_per_cycle = 10           # Max fixes to apply per cycle
auto_run_interval_hours = 0        # 0 = manual only, >0 = auto-run interval

[selfimprove.ai_infra]
enabled = false
base_url = "http://localhost:8100"
api_key_env = "MEEPT_AI_INFRA_KEY"
analysis_model = "claude-opus-4-5-20251101"     # Deep reasoning for root cause
generation_model = "claude-sonnet-4-5-20241022" # Fast code generation
review_model = "claude-opus-4-5-20251101"       # Thorough code review
timeout_seconds = 120.0
max_retries = 3

[selfimprove.sandbox]
worktree_dir = "~/.meept/selfimprove/worktrees"
cleanup_on_success = true
cleanup_on_failure = false         # Keep failed worktrees for debugging
max_worktrees = 5
test_timeout_seconds = 300.0

[selfimprove.safety]
require_human_approval = true      # Always require human approval before applying
max_files_per_fix = 10
max_lines_changed_per_fix = 500
blocked_paths = [
    "src/meept/selfimprove/*",     # Cannot modify itself (bootstrap problem)
    "src/meept/security/*",        # Cannot modify security engine
    ".git/*",                      # Cannot touch git internals
    "*.toml",                      # Cannot modify config files
    "*.json5",                     # Cannot modify model configs
    "**/*credentials*",
    "**/*secret*",
    "**/.env*",
]
allowed_risk_levels = ["low", "medium", "high"]
block_critical_risk = true
require_tests_pass = true
min_confidence_threshold = 0.7

[selfimprove.detection]
scan_pytest = true
scan_runtime_logs = true
scan_type_check = true
scan_lint = true
log_file = "~/.meept/meept.log"
log_lookback_hours = 24
pytest_args = ["-v", "--tb=short"]
mypy_args = ["--ignore-missing-imports"]
ruff_args = []

# Agent loop improvements: progress updates, caching, and error recovery

[agent]
progress_enabled = true              # Enable streaming progress updates during long operations
progress_interval_seconds = 30       # Minimum interval between progress events

[agent.cache]
enabled = true                        # Enable tool result caching
max_entries = 1000                    # Maximum number of cached results
default_ttl_seconds = 300             # Default TTL (5 minutes)
cleanup_freq_seconds = 60             # Cleanup interval (1 minute)
enabled_tools = [                     # Tools to cache (read-only, idempotent operations)
    "file_read",
    "list_directory",
    "memory_search",
    "memory_get_context",
    "platform_status",
    "platform_agents",
    "platform_tools"
]

[agent.errors]
detailed_errors = true                # Enable detailed error messages
include_examples = true               # Include usage examples in error messages
max_suggestion_length = 500           # Maximum length of error suggestions

[review]
enabled = true
# Tool hints that always require review
require_review = ["code", "refactor", "debug", "git", "fix"]
# Tool hints that never require review (trusted operations)
skip_review = ["chat", "report", "recall", "search", "analyze"]
# Agent to reviewer mapping
reviewer_mapping = {coder = "code-reviewer", debugger = "debug-reviewer", planner = "planner-reviewer", analyst = "analyst-reviewer", committer = "code-reviewer"}
# Maximum revision cycles before human intervention
max_revision_cycles = 3
# Auto-approve low-risk file patterns
auto_approve_patterns = ["*.md", "LICENSE", "*.txt"]

[calendar]
enabled = false
# Google OAuth2 credentials (supports ${ENV_VAR} expansion)
client_id = "${GOOGLE_CLIENT_ID}"
client_secret = "${GOOGLE_CLIENT_SECRET}"
calendar_id = "primary"                  # Calendar ID to use (default: "primary")
redirect_uri = "http://localhost:8888/callback"  # OAuth2 redirect URI
reminder_enabled = false                  # Enable reminder watcher for upcoming events
reminder_check_interval = "5m"            # How often to check for upcoming events
reminder_advance_minutes = 10             # Trigger reminders this many minutes before an event
