# Meept Configuration
# Copy to ~/.meept/meept.toml and customize

[daemon]
socket_path = "~/.meept/meept.sock"
pid_file = "~/.meept/meept.pid"
log_level = "INFO"
data_dir = "~/.meept"

# LLM model configuration has moved to config/models.json5
# (JSON5 format with provider/model-id references and capability tags)

[llm.budget]
hourly_token_limit = 100000
daily_token_limit = 1000000
rate_limit_rpm = 30
aggressiveness = 0.5  # 0.0 = very conservative, 1.0 = use full budget

[memory]
data_dir = "~/.meept/memory"
consolidation_interval_hours = 6

[memory.episodic]
enabled = true
max_context_items = 20

[memory.task]
enabled = true
# Separate .mv2 files per domain
domains = ["general", "code", "commands"]

[memory.personality]
enabled = true
update_interval_conversations = 10

[security]
# Input sanitization
sanitize_inputs = true
llm_filter_external = false  # Enable LLM-based filtering for untrusted sources

# Action permissions
require_confirmation_high = true
require_confirmation_critical = true
block_financial = true

# Allowed paths for file operations (glob patterns)
allowed_paths = ["~/*"]
blocked_paths = ["~/.ssh/*", "~/.gnupg/*", "~/.meept/meept.toml"]

[scheduler]
enabled = true
timezone = "UTC"

[telegram]
enabled = false
token = ""
creator_id = 0  # Telegram user ID of the creator

[web]
enabled = false
host = "127.0.0.1"
port = 8420
secret_key = ""  # Required for JWT

[mcp]
enabled = false
config_file = "~/.meept/mcp_servers.json"
# MCP servers are configured in a separate JSON file.
# Example mcp_servers.json:
# {
#   "servers": [
#     {
#       "name": "filesystem",
#       "type": "stdio",
#       "command": ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/home/user"]
#     },
#     {
#       "name": "remote-api",
#       "type": "http",
#       "url": "https://mcp.example.com/api",
#       "headers": {"Authorization": "Bearer ${MCP_API_KEY}"}
#     }
#   ]
# }

[plugins]
enabled = true
directory = "~/.meept/plugins"

[workspace]
enabled = true
base_dir = "~/.meept/workspaces"
auto_commit = true
commit_on_plan = true
commit_on_step = true
cleanup_completed = false

[skills]
enabled = false
search_paths = []     # Additional skill directories beyond defaults
auto_reload = false   # Watch for skill file changes (not yet implemented)
# Skills are discovered via 3-tier SKILL.md scanning:
#   1. .meept/skills/           (project-local, highest priority)
#   2. ~/.meept/skills/         (user-global)
#   3. ~/.config/meept/skills/  (system-wide, lowest priority)
# Model selection uses capability matching from config/models.json5
#
# Invoke skills with: /skill-name <input>
# List skills with: meept skills list
# Show skill details: meept skills show <name>
# Run a skill: meept skills run <name> <input>

[clawskills]
enabled = false
registry_url = "https://clawhub.ai"
install_dir = "~/.meept/clawskills"
auto_update = false                # Automatically update skills on daemon start
max_installed = 50                 # Maximum number of installed clawskills
default_risk_level = "high"        # All clawskills are treated as HIGH risk (cannot go lower)
max_iterations = 10                # Cap agent-loop iterations for clawskills
blocked_slugs = []                 # Slugs that will never be loaded by the daemon

[selfimprove]
enabled = false
data_dir = "~/.meept/selfimprove"
max_iterations_per_cycle = 5       # Max improvement iterations per run
max_fixes_per_cycle = 10           # Max fixes to apply per cycle
auto_run_interval_hours = 0        # 0 = manual only, >0 = auto-run interval

[selfimprove.ai_infra]
enabled = false
base_url = "http://localhost:8100"
api_key_env = "MEEPT_AI_INFRA_KEY"
analysis_model = "claude-opus-4-5-20251101"     # Deep reasoning for root cause
generation_model = "claude-sonnet-4-5-20241022" # Fast code generation
review_model = "claude-opus-4-5-20251101"       # Thorough code review
timeout_seconds = 120.0
max_retries = 3

[selfimprove.sandbox]
worktree_dir = "~/.meept/selfimprove/worktrees"
cleanup_on_success = true
cleanup_on_failure = false         # Keep failed worktrees for debugging
max_worktrees = 5
test_timeout_seconds = 300.0

[selfimprove.safety]
require_human_approval = true      # Always require human approval before applying
max_files_per_fix = 10
max_lines_changed_per_fix = 500
blocked_paths = [
    "src/meept/selfimprove/*",     # Cannot modify itself (bootstrap problem)
    "src/meept/security/*",        # Cannot modify security engine
    ".git/*",                      # Cannot touch git internals
    "*.toml",                      # Cannot modify config files
    "*.json5",                     # Cannot modify model configs
    "**/*credentials*",
    "**/*secret*",
    "**/.env*",
]
allowed_risk_levels = ["low", "medium", "high"]
block_critical_risk = true
require_tests_pass = true
min_confidence_threshold = 0.7

[selfimprove.detection]
scan_pytest = true
scan_runtime_logs = true
scan_type_check = true
scan_lint = true
log_file = "~/.meept/meept.log"
log_lookback_hours = 24
pytest_args = ["-v", "--tb=short"]
mypy_args = ["--ignore-missing-imports"]
ruff_args = []
