openapi: 3.0.3
info:
  title: Meept HTTP API
  description: REST API for Meept daemon - exposes chat, memory, task queue, skills, and self-improvement capabilities
  version: 0.2.0

servers:
  - url: http://localhost:8081
    description: Local development server

tags:
  - name: health
  - name: v1
  - name: WebSocket

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "API key authentication. Use: Authorization: Bearer YOUR_API_KEY"

  schemas:
    BusService:
      type: object
      properties:
        bus:
          type: object
          nullable: true
    PublishRequest:
      type: object
      properties:
        topic:
          type: string
        type:
          type: string
        source,omitempty:
          type: string
        payload,omitempty:
          type: string
          nullable: true
      required:
        - topic
        - type
    BusStatsResponse:
      type: object
      properties:
        subscribers:
          type: integer
        messages_sent:
          type: integer
        queued_messages:
          type: integer
      required:
        - subscribers
        - messages_sent
        - queued_messages
    CacheService:
      type: object
      properties:
        cache:
          type: object
          nullable: true
    CacheStatsResponse:
      type: object
      properties:
        hits:
          type: integer
        misses:
          type: integer
        size:
          type: integer
      required:
        - hits
        - misses
        - size
    ClearCacheRequest:
      type: object
      properties:
        prefix,omitempty:
          type: string
    InvalidateRequest:
      type: object
      properties:
        path,omitempty:
          type: string
    CacheInspectResult:
      type: object
      properties:
        prompt_hash:
          type: string
        model_id:
          type: string
        created_at:
          type: string
        expires_at:
          type: string
        hit_count:
          type: integer
        file_hashes,omitempty:
          type: string
          nullable: true
        source:
          type: string
      required:
        - prompt_hash
        - model_id
        - created_at
        - expires_at
        - hit_count
        - source
    CalendarService:
      type: object
      properties:
        client:
          type: object
          nullable: true
    CalendarEvent:
      type: object
      properties:
        id:
          type: string
        summary:
          type: string
        description,omitempty:
          type: string
        location,omitempty:
          type: string
        start:
          type: string
        end:
          type: string
        all_day:
          type: boolean
        status,omitempty:
          type: string
        html_link,omitempty:
          type: string
        attendees,omitempty:
          type: array
          nullable: true
      required:
        - id
        - summary
        - start
        - end
        - all_day
    AttendeeInfo:
      type: object
      properties:
        email:
          type: string
        display_name,omitempty:
          type: string
        response,omitempty:
          type: string
      required:
        - email
    ListEventsRequest:
      type: object
      properties:
        time_min,omitempty:
          type: string
        time_max,omitempty:
          type: string
        max_results,omitempty:
          type: integer
    ListEventsResponse:
      type: object
      properties:
        events:
          type: array
          nullable: true
        count:
          type: integer
      required:
        - events
        - count
    CreateEventRequest:
      type: object
      properties:
        summary:
          type: string
        description,omitempty:
          type: string
        location,omitempty:
          type: string
        start:
          type: string
        end:
          type: string
        attendees,omitempty:
          type: string
          nullable: true
      required:
        - summary
        - start
        - end
    UpdateEventRequest:
      type: object
      properties:
        id:
          type: string
        summary,omitempty:
          type: string
        description,omitempty:
          type: string
        location,omitempty:
          type: string
        start,omitempty:
          type: string
          nullable: true
        end,omitempty:
          type: string
          nullable: true
      required:
        - id
    ChatService:
      type: object
      properties:
        bus:
          type: object
          nullable: true
        agentRegistry:
          type: object
          nullable: true
        sessionStore:
          type: object
        logger:
          type: object
          nullable: true
    ChatRequest:
      type: object
      properties:
        message:
          type: string
        conversation_id:
          type: string
        agent_id,omitempty:
          type: string
      required:
        - message
        - conversation_id
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        model,omitempty:
          type: string
        tokens_used,omitempty:
          type: integer
      required:
        - reply
    SteerRequest:
      type: object
      properties:
        message:
          type: string
        conversation_id:
          type: string
        source,omitempty:
          type: string
      required:
        - message
        - conversation_id
    FollowUpRequest:
      type: object
      properties:
        message:
          type: string
        conversation_id:
          type: string
        source,omitempty:
          type: string
      required:
        - message
        - conversation_id
    QueueStatusRequest:
      type: object
      properties:
        conversation_id:
          type: string
      required:
        - conversation_id
    QueueStatusResponse:
      type: object
      properties:
        steering_depth:
          type: integer
        followup_depth:
          type: integer
        is_active:
          type: boolean
        generation:
          type: integer
      required:
        - steering_depth
        - followup_depth
        - is_active
        - generation
    DaemonStatus:
      type: object
      properties:
        status:
          type: string
        pid,omitempty:
          type: integer
        uptime_seconds,omitempty:
          type: number
        model,omitempty:
          type: string
        tokens_used:
          type: integer
        tokens_remaining:
          type: integer
        budget_used:
          type: number
        budget_remaining:
          type: number
        # Hourly budget
        hourly_used:
          type: integer
        hourly_remaining:
          type: integer
        # Daily budget
        daily_used:
          type: integer
        daily_remaining:
          type: integer
        # Rate limiting
        rpm_current:
          type: integer
        rpm_limit:
          type: integer
        # Cost budgets
        daily_cost_used:
          type: number
        daily_cost_limit:
          type: number
        hourly_cost_used:
          type: number
        hourly_cost_limit:
          type: number
        # Per-task budgets
        per_task_cost:
          type: number
        per_task_budget:
          type: integer
        # Per-session budgets
        per_session_cost:
          type: number
        per_session_budget:
          type: integer
        registered_methods:
          type: integer
        bus_subscribers:
          type: integer
      required:
        - status
        - tokens_used
        - tokens_remaining
        - budget_used
        - budget_remaining
        - registered_methods
        - bus_subscribers
    DaemonService:
      type: object
      properties:
        pidFile:
          type: string
        stateDir:
          type: string
        binPath:
          type: string
        controller:
          type: object
    ServiceError:
      type: object
      properties:
        Service:
          type: string
        Op:
          type: string
        Err:
          type: object
    MemoryService:
      type: object
      properties:
        manager:
          type: object
          nullable: true
    MemoryQueryRequest:
      type: object
      properties:
        query:
          type: string
        limit,omitempty:
          type: integer
        category,omitempty:
          type: string
      required:
        - query
    MemoryResult:
      type: object
      properties:
        memory:
          type: object
        relevance_score:
          type: number
        source:
          type: string
      required:
        - memory
        - relevance_score
        - source
    VectorSearchRequest:
      type: object
      properties:
        query:
          type: string
        limit,omitempty:
          type: integer
        shard_types,omitempty:
          type: string
          nullable: true
      required:
        - query
    VectorSearchResult:
      type: object
      properties:
        memory_id:
          type: string
        content:
          type: string
        metadata,omitempty:
          type: string
          nullable: true
        relevance_score:
          type: number
        vector_similarity:
          type: number
      required:
        - memory_id
        - content
        - relevance_score
        - vector_similarity
    VectorStoreRequest:
      type: object
      properties:
        memory_id:
          type: string
        content:
          type: string
        metadata,omitempty:
          type: string
          nullable: true
      required:
        - memory_id
        - content
    VectorStats:
      type: object
      properties:
        loaded_shards:
          type: integer
        max_ram_shards:
          type: integer
        lru_hits:
          type: integer
        lru_misses:
          type: integer
        lru_evictions:
          type: integer
        shard_details:
          type: string
          nullable: true
      required:
        - loaded_shards
        - max_ram_shards
        - lru_hits
        - lru_misses
        - lru_evictions
        - shard_details
    ShardDetail:
      type: object
      properties:
        dimension:
          type: integer
        m:
          type: integer
        ef_construction:
          type: integer
        ef_search:
          type: integer
        vector_count:
          type: integer
        database_size_bytes:
          type: integer
        shard_id:
          type: string
      required:
        - dimension
        - m
        - ef_construction
        - ef_search
        - vector_count
        - database_size_bytes
        - shard_id
    ModelInfo:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        full_name:
          type: string
        base_url:
          type: string
        context_limit:
          type: integer
        max_output:
          type: integer
        capabilities:
          type: string
          nullable: true
        is_default:
          type: boolean
        input_cost:
          type: number
        output_cost:
          type: number
      required:
        - provider
        - model
        - full_name
        - base_url
        - context_limit
        - max_output
        - capabilities
        - is_default
        - input_cost
        - output_cost
    ProviderInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        api:
          type: string
        base_url:
          type: string
        models:
          type: string
          nullable: true
        has_credentials:
          type: boolean
      required:
        - id
        - name
        - api
        - base_url
        - models
        - has_credentials
    ModelService:
      type: object
      properties:
        configPath:
          type: string
        credStore:
          type: object
          nullable: true
        stateDir:
          type: string
    Pipeline:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
        steps:
          type: array
          nullable: true
        metadata:
          type: string
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - name
        - description
        - status
        - steps
        - metadata
        - created_at
        - updated_at
    PipelineStep:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        error,omitempty:
          type: string
        started_at,omitempty:
          type: string
          nullable: true
        ended_at,omitempty:
          type: string
          nullable: true
      required:
        - id
        - name
        - status
    PipelineService:
      type: object
      properties:
        mu:
          type: object
        pipelines:
          type: string
          nullable: true
    StatusRequest:
      type: object
      properties:
        pipeline_id:
          type: string
      required:
        - pipeline_id
    PipelineStatusResponse:
      type: object
      properties:
        pipeline_id:
          type: string
        name:
          type: string
        status:
          type: string
        steps:
          type: array
          nullable: true
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - pipeline_id
        - name
        - status
        - steps
        - created_at
        - updated_at
    PipelineStepStatus:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        error,omitempty:
          type: string
        started_at,omitempty:
          type: string
          nullable: true
        ended_at,omitempty:
          type: string
          nullable: true
      required:
        - id
        - name
        - status
    PipelineListRequest:
      type: object
      properties:
        limit,omitempty:
          type: integer
    PipelineInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        created_at:
          type: string
      required:
        - id
        - name
        - status
        - created_at
    CreatePipelineRequest:
      type: object
      properties:
        id,omitempty:
          type: string
        name:
          type: string
        description,omitempty:
          type: string
        steps,omitempty:
          type: array
          nullable: true
        metadata,omitempty:
          type: string
          nullable: true
      required:
        - name
    DeletePipelineRequest:
      type: object
      properties:
        pipeline_id:
          type: string
      required:
        - pipeline_id
    UpdateStatusRequest:
      type: object
      properties:
        pipeline_id:
          type: string
        status:
          type: string
      required:
        - pipeline_id
        - status
    PlanService:
      type: object
      properties:
        manager:
          type: object
          nullable: true
        store:
          type: object
    CreatePlanRequest:
      type: object
      properties:
        title:
          type: string
        description,omitempty:
          type: string
        project_id,omitempty:
          type: string
        project_path,omitempty:
          type: string
        session_id:
          type: string
      required:
        - title
        - session_id
    ApprovePlanRequest:
      type: object
      properties:
        plan_id:
          type: string
        session_id:
          type: string
        by:
          type: string
      required:
        - plan_id
        - session_id
        - by
    RejectPlanRequest:
      type: object
      properties:
        plan_id:
          type: string
        session_id:
          type: string
        by:
          type: string
        reason,omitempty:
          type: string
      required:
        - plan_id
        - session_id
        - by
    ConfirmPlanRequest:
      type: object
      properties:
        plan_id:
          type: string
        session_id:
          type: string
        by:
          type: string
      required:
        - plan_id
        - session_id
        - by
    RevisePlanRequest:
      type: object
      properties:
        plan_id:
          type: string
        session_id:
          type: string
        feedback:
          type: string
      required:
        - plan_id
        - session_id
        - feedback
    ProjectService:
      type: object
      properties:
        pm:
          type: object
          nullable: true
        store:
          type: object
    RegisterProjectRequest:
      type: object
      properties:
        id,omitempty:
          type: string
        name:
          type: string
        git_url,omitempty:
          type: string
        local_path,omitempty:
          type: string
      required:
        - name
    SetProjectRequest:
      type: object
      properties:
        session_id:
          type: string
        project_id:
          type: string
      required:
        - session_id
        - project_id
    QueueService:
      type: object
      properties:
        q:
          type: object
    EnqueueRequest:
      type: object
      properties:
        type:
          type: string
        priority,omitempty:
          type: integer
        task_id,omitempty:
          type: string
        prompt:
          type: string
        session_id,omitempty:
          type: string
        required_caps,omitempty:
          type: string
          nullable: true
        payload,omitempty:
          type: string
          nullable: true
      required:
        - type
        - prompt
    ClaimRequest:
      type: object
      properties:
        worker_id:
          type: string
        capabilities,omitempty:
          type: string
          nullable: true
      required:
        - worker_id
    CompleteRequest:
      type: object
      properties:
        job_id:
          type: string
        result,omitempty:
          type: object
      required:
        - job_id
    FailRequest:
      type: object
      properties:
        job_id:
          type: string
        error:
          type: string
      required:
        - job_id
        - error
    RetryRequest:
      type: object
      properties:
        job_id:
          type: string
      required:
        - job_id
    GetRequest:
      type: object
      properties:
        job_id:
          type: string
      required:
        - job_id
    ListRequest:
      type: object
      properties:
        state,omitempty:
          type: string
        limit,omitempty:
          type: integer
    RuntimeService:
      type: object
      properties:
        manager:
          type: object
          nullable: true
    RuntimeStatusResponse:
      type: object
      properties:
        runtimes:
          type: array
          nullable: true
      required:
        - runtimes
    SchedulerService:
      type: object
      properties:
        scheduler:
          type: object
          nullable: true
    ListJobsResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        schedule:
          type: string
        enabled:
          type: boolean
        last_run,omitempty:
          type: string
          nullable: true
        next_run,omitempty:
          type: string
          nullable: true
        last_error,omitempty:
          type: string
        run_count:
          type: integer
        is_running:
          type: boolean
      required:
        - id
        - name
        - schedule
        - enabled
        - run_count
        - is_running
    AddJobRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        schedule:
          type: string
        type:
          type: string
        agent_config,omitempty:
          type: object
          nullable: true
        shell_config,omitempty:
          type: object
          nullable: true
        enabled,omitempty:
          type: boolean
      required:
        - id
        - name
        - schedule
        - type
    AgentJobConfig:
      type: object
      properties:
        prompt:
          type: string
        context,omitempty:
          type: string
          nullable: true
        model,omitempty:
          type: string
        max_tokens,omitempty:
          type: integer
        temperature,omitempty:
          type: number
      required:
        - prompt
    ShellJobConfig:
      type: object
      properties:
        command:
          type: string
        args,omitempty:
          type: string
          nullable: true
        work_dir,omitempty:
          type: string
        env,omitempty:
          type: string
          nullable: true
        timeout_secs,omitempty:
          type: integer
        capture_output:
          type: boolean
      required:
        - command
        - capture_output
    AddJobResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        schedule:
          type: string
        enabled:
          type: boolean
        last_run,omitempty:
          type: string
          nullable: true
        next_run,omitempty:
          type: string
          nullable: true
        last_error,omitempty:
          type: string
        run_count:
          type: integer
        is_running:
          type: boolean
      required:
        - id
        - name
        - schedule
        - enabled
        - run_count
        - is_running
    RemoveJobRequest:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    EnableJobRequest:
      type: object
      properties:
        id:
          type: string
        enabled:
          type: boolean
      required:
        - id
        - enabled
    PauseJobRequest:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    ResumeJobRequest:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    SearchResult:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        title:
          type: string
        snippet:
          type: string
        relevance:
          type: number
      required:
        - type
        - id
        - title
        - snippet
        - relevance
    SearchRequest:
      type: object
      properties:
        query:
          type: string
        scope,omitempty:
          type: string
        limit,omitempty:
          type: integer
      required:
        - query
    SearchService:
      type: object
      properties:
        sessionStore:
          type: object
        taskRegistry:
          type: object
          nullable: true
        memoryMgr:
          type: object
          nullable: true
        planStore:
          type: object
    SecurityService:
      type: object
      properties:
        checker:
          type: object
          nullable: true
    CheckRequest:
      type: object
      properties:
        action:
          type: string
        resource:
          type: string
      required:
        - action
        - resource
    CheckResponse:
      type: object
      properties:
        allowed:
          type: boolean
        reason,omitempty:
          type: string
      required:
        - allowed
    AuditEntry:
      type: object
      properties:
        timestamp:
          type: string
        action:
          type: string
        resource:
          type: string
        allowed:
          type: boolean
      required:
        - timestamp
        - action
        - resource
        - allowed
    AuditRequest:
      type: object
      properties:
        limit,omitempty:
          type: integer
    SelfImproveService:
      type: object
      properties:
        controller:
          type: object
          nullable: true
    StatusResponse:
      type: object
      properties:
        enabled:
          type: boolean
        last_cycle,omitempty:
          type: string
        skills_learned:
          type: integer
        pending_tasks:
          type: integer
      required:
        - enabled
        - skills_learned
        - pending_tasks
    TriggerRequest:
      type: object
      properties:
        force,omitempty:
          type: boolean
    CancelRequest:
      type: object
      properties:
        cycle_id:
          type: string
      required:
        - cycle_id
    GenerateImprovementRequest:
      type: object
      properties:
        improvement_id:
          type: string
      required:
        - improvement_id
    ValidateImprovementRequest:
      type: object
      properties:
        improvement_id:
          type: string
      required:
        - improvement_id
    ApplyImprovementRequest:
      type: object
      properties:
        improvement_id:
          type: string
      required:
        - improvement_id
    RejectImprovementRequest:
      type: object
      properties:
        improvement_id:
          type: string
        reason:
          type: string
      required:
        - improvement_id
        - reason
    ServiceRegistry:
      type: object
      properties:
        Chat:
          type: object
          nullable: true
        Memory:
          type: object
          nullable: true
        Task:
          type: object
          nullable: true
        Queue:
          type: object
          nullable: true
        Session:
          type: object
          nullable: true
        SessionStore:
          type: object
        Worker:
          type: object
          nullable: true
        Pipeline:
          type: object
          nullable: true
        Skills:
          type: object
          nullable: true
        SelfImprove:
          type: object
          nullable: true
        Cache:
          type: object
          nullable: true
        Security:
          type: object
          nullable: true
        Scheduler:
          type: object
          nullable: true
        Bus:
          type: object
          nullable: true
        Templates:
          type: object
          nullable: true
        Daemon:
          type: object
          nullable: true
        Model:
          type: object
          nullable: true
        Calendar:
          type: object
          nullable: true
        Runtime:
          type: object
          nullable: true
        Terminal:
          type: object
          nullable: true
        Project:
          type: object
          nullable: true
        Plan:
          type: object
          nullable: true
        Search:
          type: object
          nullable: true
    Config:
