site_name: Meept
site_dir: mkdocs
site_description: Self-executing autonomous agent daemon with multi-agent orchestration, hybrid memory, and skill-based task execution.
site_url: https://github.com/caimlas/meept
repo_url: https://github.com/caimlas/meept
repo_name: caimlas/meept

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy
    - content.code.annotate
  logo: img/logo.svg

plugins:
  - search
  - mermaid2:
      version: 10.9.0
  - git-revision-date-localized:
  - awesome-pages

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/caimlas/meept

copyright: MIT License
