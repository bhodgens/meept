# Dart SDK Generator Configuration
# See: https://openapi-generator.tech/docs/generators/dart
generatorName: dart
outputDir: ./sdk/dart
inputSpec: ../../docs/reference/http-api/openapi.yaml
templateDir: null

# Generator-specific options
additionalProperties:
  packageName: meept_client
  packageVersion: 0.2.0
  pubName: meept_client
  pubLibrary: meept_client

  # Use null-safe Dart
  useNullSafety: true

  # CRITICAL: Generate standalone model files (not "part of" directives)
  # This allows direct imports like: import 'package:meept_client/model/chat_request.dart';
  separateModels: true
  useJsonSerializable: true

  # Naming conventions
  modelPropertyNaming: camelCase
  enumPropertyNaming: camelCase

  # Skip test generation (we don't need generated tests)
  modelTest: false
  apiTest: false

  # Generate only models and apis (no extra files)
  models: ""
  apis: ""

# Files to generate
generatorOptions:
  - apis
  - models
  - supportingFiles
