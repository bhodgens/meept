name: meept_ui
description: Meept Cyberpunk Flutter UI - Web and macOS desktop client
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.10.3 <4.0.0'
  flutter: '>=3.38.4'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP & WebSocket
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Navigation
  go_router: ^14.0.0

  # Forms
  flutter_form_builder: ^9.2.1
  formz: ^0.7.0

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # Speech-to-text
  speech_to_text: ^7.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.2
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  timeago: ^3.6.1

  # Error reporting
  sentry_flutter: ^8.0.0

  # Markdown rendering
  flutter_markdown: ^0.6.23
  flutter_highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  fake_async: ^1.3.3
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1
  freezed: ^2.5.0

flutter:
  uses-material-design: true
  fonts:
    - family: SourceCodePro
      fonts:
        - asset: assets/fonts/SourceCodePro-Regular.ttf
        - asset: assets/fonts/SourceCodePro-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: ShareTechMono
      fonts:
        - asset: assets/fonts/ShareTechMono-Regular.ttf
  assets:
    - assets/images/
    - assets/shaders/
